<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>Cloud Panel</title>
    <link rel="icon" href="/img/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/style.css" />
    <!-- Live theme (admin-customizable). Loaded after the base styles so its
         :root overrides win. Public endpoint = no flash of default theme. -->
    <link id="cp-appearance" rel="stylesheet" href="/api/appearance.css" />
  </head>
  <body>
    <div id="app">
      <div class="boot">
        <div class="boot-logo"></div>
        <div class="boot-text">Cloud Panel</div>
        <div class="boot-bar"><span></span></div>
      </div>
    </div>

    <div id="toasts"></div>
    <div id="modal-root"></div>

    <!-- Self-contained modules, no bundler, loaded in dependency order -->
    <script src="/js/ui.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/appearance.js"></script>
    <script src="/js/pages/setup.js"></script>
    <script src="/js/pages/login.js"></script>
    <script src="/js/pages/pending.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/server.js"></script>
    <script src="/js/pages/shop.js"></script>
    <script src="/js/pages/afk.js"></script>
    <script src="/js/pages/account.js"></script>
    <script src="/js/pages/admin.js"></script>
    <script src="/js/pages/legal.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
